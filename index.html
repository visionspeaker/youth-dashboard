:root{
 --bg:#eef2f9; --panel:#ffffff; --panel2:#f4f7fc; --line:#e4e9f2;
 --tx:#1f2840; --tx2:#6b7896; --tx3:#95a0b8;
 --accent:#4f68ff; --blue:#0ea5e9; --green:#16b364; --amber:#f59e0b; --red:#f43f5e; --violet:#8b5cf6;
 --shadow:0 1px 2px rgba(31,40,64,.04),0 6px 20px rgba(31,40,64,.06);
 --shadow-hi:0 6px 16px rgba(31,40,64,.08),0 16px 40px rgba(79,104,255,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1100px 520px at 15% -10%,#e6ecfb 0,transparent 55%),radial-gradient(900px 500px at 100% 0,#eaf4fb 0,transparent 50%),var(--bg);
 color:var(--tx);font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
 padding:22px 26px 40px;min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1480px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px}
.h-left h1{font-size:26px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.h-left h1 .dot{width:11px;height:26px;background:linear-gradient(180deg,var(--accent),var(--blue));border-radius:4px;display:inline-block}
.h-left p{color:var(--tx2);font-size:13.5px;margin-top:6px}
.wk{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
 padding:8px 12px;border-radius:14px;box-shadow:var(--shadow)}
.wk button{background:var(--panel2);border:1px solid var(--line);color:var(--accent);width:30px;height:30px;
 border-radius:9px;font-size:15px;cursor:pointer;transition:.15s;line-height:1}
.wk button:hover{border-color:var(--accent);background:#eef1ff}
.wk-mid{position:relative;text-align:center;min-width:152px}
.wk-date{font-size:19px;font-weight:800;color:var(--tx);letter-spacing:-.4px;display:flex;align-items:center;justify-content:center;gap:6px;line-height:1.25}
.wk-caret{color:var(--accent);font-size:11px}
.wk-sub{font-size:11.5px;color:var(--tx2);margin-top:1px;white-space:nowrap}
.wk-mid select{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:16px}
.wk-mid:hover .wk-date{color:var(--accent)}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(6,minmax(0,1fr))}
.card{min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);
 transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hi)}
.kpi .t{font-size:12.5px;color:var(--tx2);font-weight:600;display:flex;align-items:center;gap:6px}
.kpi .v{font-size:30px;font-weight:800;margin-top:8px;letter-spacing:-1px;color:var(--tx)}
.kpi .s{font-size:12px;color:var(--tx3);margin-top:3px}
.kpi .v small{font-size:15px;font-weight:700;color:var(--tx2)}
.bar-accent{border-top:3px solid var(--accent)}
.tag{font-size:10.5px;padding:2px 7px;border-radius:20px;font-weight:700}
.tag.g{background:rgba(22,179,100,.12);color:#0f9d55}
.tag.r{background:rgba(244,63,94,.12);color:var(--red)}
.tag.a{background:rgba(245,158,11,.14);color:#c67c00}
.tag.b{background:rgba(14,165,233,.12);color:#0784b5}
.tag.v{background:rgba(139,92,246,.13);color:var(--violet)}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-h h2{font-size:15.5px;font-weight:750;display:flex;align-items:center;gap:8px}
.sec-h h2 .i{width:6px;height:16px;border-radius:3px;background:var(--accent)}
.toggle{display:flex;gap:4px;background:var(--panel2);padding:3px;border-radius:9px;border:1px solid var(--line)}
.toggle button{background:transparent;border:0;color:var(--tx2);padding:5px 12px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600;transition:.15s}
.toggle button:hover{color:var(--accent)}
.toggle button.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,104,255,.35)}
.r2{grid-template-columns:minmax(0,1.25fr) minmax(0,1fr)}
.r3{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}
.chart-box{position:relative;height:270px;min-width:0;width:100%}
.card>*{min-width:0}
canvas{max-width:100%!important}
.chart-box.sm{height:250px}
.list{max-height:300px;overflow:auto}
.list::-webkit-scrollbar{width:7px}.list::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--tx2);font-weight:600;font-size:11.5px;padding:6px 8px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
td{padding:7px 8px;border-bottom:1px solid #eef1f7}
tbody tr{transition:background .12s}
tbody tr:hover{background:#f5f8ff}
.ol-row{border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px}
.ol-h{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.ol-h b{font-weight:750;color:var(--tx)}
.ol-amt{font-weight:700;font-variant-numeric:tabular-nums}
.ol-note{font-size:12px;color:var(--tx2);margin-top:6px}
.ol-sub{font-size:12px;font-weight:700;color:var(--tx2);margin:0 0 8px}
.ol-grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;margin-bottom:6px}
.ol-empty{padding:18px;text-align:center;color:var(--tx2);font-size:13px}
.chip.hot{background:#fff8ec;border-color:#f6d9a6}
.chip.hot .gr{color:#c67c00;background:rgba(245,158,11,.16)}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);
 border-radius:10px;padding:7px 11px;font-size:13px;font-weight:600;margin:0 6px 8px 0;transition:.15s;cursor:default}
.chip:hover{border-color:var(--green);background:#effaf3;transform:translateY(-1px)}
.chip .gr{font-size:10.5px;color:var(--tx2);background:#e9eef7;padding:1px 6px;border-radius:6px}
.off-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eef1f7;font-size:13.5px}
.off-row b{font-variant-numeric:tabular-nums}
.mut{color:var(--tx2)}
.foot{margin-top:22px;color:var(--tx3);font-size:11.5px;line-height:1.7;border-top:1px solid var(--line);padding-top:14px}
.foot a{color:#0784b5;text-decoration:none}
.foot a:hover{text-decoration:underline}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes headIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{transform:scaleY(.2);opacity:0}to{transform:scaleY(1);opacity:1}}
.rv{opacity:0}
.rv.in{animation:fadeUp 1.05s cubic-bezier(.22,.9,.3,1) both}
.kpi-anim{animation:popIn .85s cubic-bezier(.22,.9,.3,1) both}
.head-anim{animation:headIn 1s cubic-bezier(.22,.9,.3,1) both}
@media(prefers-reduced-motion:reduce){.rv,.rv.in,.kpi-anim,.head-anim{animation:none!important;opacity:1!important}}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,minmax(0,1fr))}.r2,.r3{grid-template-columns:minmax(0,1fr)}}
@media(max-width:720px){.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>

 return {ws,csum,offTot,monthly,monthlyOff,weekly,perfect,near,gradeAvg,nf,freq,
   rate:+(chulS/jaeS*100).toFixed(1),avgChul:+(chulS/ws.length).toFixed(1)};
}

// ===== KPI =====
function countUp(el,to,dec,ms){
 const from=0,t0=performance.now();
 const step=now=>{let p=Math.min(1,(now-t0)/ms);p=1-Math.pow(1-p,3);
   el.textContent=(from+(to-from)*p).toFixed(dec);
   if(p<1)requestAnimationFrame(step);else el.textContent=to.toFixed(dec);};
 requestAnimationFrame(step);
}
function renderKPI(){
 const w=D.order[cur],wd=D.weekly_detail[w];
 const cards=[
  {t:'재적 (학생) · 선택주',n:wd.jae,d:0,u:'명',s:'교사 '+wd.tea+'명',cls:''},
  {t:'평균 출석률 · 누적',n:A.rate,d:1,u:'%',s:'1월~'+w+' · '+A.ws.length+'주',cls:'bar-accent'},
  {t:'평균 출석 · 누적',n:A.avgChul,d:1,u:'명',s:'주 평균 (새친구 포함)',cls:''},
  {t:'완전개근 · 누적',n:A.perfect.filter(p=>!p.joinIdx).length,d:0,u:'명',s:'1월~'+w+' 결석 0회',cls:''},
  {t:'새친구 · 누적',n:A.nf.length,d:0,u:'명',s:'1월~'+w,cls:''},
  {t:'헌금 · 누적',n:Math.round(A.offTot/10000),d:0,u:'만원',s:'1월~'+w+' 합계',cls:''},
 ];
 const box=document.getElementById('kpis');
 box.innerHTML=cards.map((c,i)=>
  `<div class="card kpi kpi-anim ${c.cls}" style="animation-delay:${i*120}ms">
     <div class="t">${c.t}</div>
     <div class="v"><span class="num" data-to="${c.n}" data-dec="${c.d}">0</span><small> ${c.u}</small></div>
     <div class="s">${c.s}</div></div>`).join('');
 box.querySelectorAll('.num').forEach((el,i)=>{
   const to=+el.dataset.to, dec=+el.dataset.dec;
   setTimeout(()=>countUp(el,to,dec,1400), 220+i*120);
 });
 setTimeout(()=>box.querySelectorAll('.kpi').forEach(k=>k.classList.remove('kpi-anim')),1700);
}

// ===== charts =====
let attCh,grCh,offCh,offM,attMode='month',grMode='avg',grArr=[];
const OFFPAL=[cAcc,cViolet,cBlue,cGreen,cAmber,cRed];
function drawAtt(mode){
 attMode=mode;
 const dd=mode==='month'
   ?{labels:A.monthly.map(m=>m.month),bars:A.monthly.map(m=>m.avg_chul),line:A.monthly.map(m=>m.rate),blabel:'평균 출석'}
   :{labels:A.weekly.map(m=>m.label),bars:A.weekly.map(m=>m.chul),line:A.weekly.map(m=>m.rate),blabel:'출석'};
 if(attCh){
   attCh.data.labels=dd.labels;
   attCh.data.datasets[0].label=dd.blabel; attCh.data.datasets[0].data=dd.bars;
   attCh.data.datasets[1].data=dd.line;
   safeUpdate(attCh); return;
 }
 attCh=new Chart(document.getElementById('attChart'),{data:{labels:dd.labels,datasets:[
   {type:'bar',label:dd.blabel,data:dd.bars,backgroundColor:'rgba(79,104,255,.5)',hoverBackgroundColor:cAcc,borderRadius:6,maxBarThickness:46,yAxisID:'y',order:2},
   {type:'line',label:'출석률(%)',data:dd.line,borderColor:cBlue,backgroundColor:'rgba(14,165,233,.12)',fill:true,tension:.35,yAxisID:'y1',pointRadius:3,pointHoverRadius:6,pointBackgroundColor:'#fff',pointBorderColor:cBlue,pointBorderWidth:2,borderWidth:2.5,order:1}
 ]},options:{maintainAspectRatio:false,animation:{duration:1700,easing:'easeOutQuart'},interaction:{mode:'index',intersect:false},
   onHover:(e,el)=>{if(e.native&&e.native.target)e.native.target.style.cursor=(attMode==='week'&&el.length)?'pointer':'default';},
   plugins:{legend:{position:'top'},tooltip:{callbacks:{afterBody:()=>attMode==='week'?'▶ 클릭하면 그 주까지 누적으로 이동':''}}},
   scales:{y:{beginAtZero:true,grid:{color:cLine},title:{display:true,text:'명'}},
     y1:{position:'right',min:0,max:100,grid:{drawOnChartArea:false},title:{display:true,text:'%'}},
     x:{grid:{display:false}}}}});
 attCh.canvas.addEventListener('click',ev=>{
   if(attMode!=='week'||!attCh||!attCh.scales||!attCh.scales.x)return;
   const rect=attCh.canvas.getBoundingClientRect();
   const idx=Math.round(attCh.scales.x.getValueForPixel(ev.clientX-rect.left));
   if(idx>=0&&idx<D.order.length&&idx!==cur){const j=idx;setTimeout(()=>{cur=j;sel.value=cur;render();},0);}
 });
}
function drawGr(mode){
 grMode=mode;
 const arr=mode==='week'?D.weekly_detail[D.order[cur]].grade:A.gradeAvg; grArr=arr;
 const labels=arr.map(g=>g.grade),rates=arr.map(g=>g.rate);
 const cols=rates.map(r=>r>=80?cGreen:r>=65?cAmber:cRed);
 const lbl=mode==='week'?fmtDay(D.order[cur])+' 출석률(%)':'누적 평균 출석률(%)';
 if(grCh){
   grCh.data.labels=labels;
   grCh.data.datasets[0].label=lbl; grCh.data.datasets[0].data=rates;
   grCh.data.datasets[0].backgroundColor=cols.map(c=>c+'d9'); grCh.data.datasets[0].hoverBackgroundColor=cols;
   safeUpdate(grCh); return;
 }
 grCh=new Chart(document.getElementById('grChart'),{type:'bar',data:{labels,datasets:[
   {label:lbl,data:rates,backgroundColor:cols.map(c=>c+'d9'),hoverBackgroundColor:cols,borderRadius:8,maxBarThickness:66}]},
   options:{maintainAspectRatio:false,animation:{duration:1500,easing:'easeOutQuart'},plugins:{legend:{display:false},
     tooltip:{callbacks:{afterLabel:ctx=>{if(grMode!=='week')return'';const g=grArr[ctx.dataIndex];return g?`출석 ${g.present}/${g.size}명`:'';}}}},
   scales:{y:{beginAtZero:true,max:100,grid:{color:cLine},title:{display:true,text:'%'}},x:{grid:{display:false}}}}});
}
function drawOff(){
 const EXC=D.excludeCats||[];
 const by=D.categories.map((c,i)=>({cat:c,amt:A.csum[i],color:OFFPAL[i%OFFPAL.length]})).filter(c=>!EXC.includes(c.cat));
 const bc=by.filter(c=>c.amt>0);
 if(offCh){
   offCh.data.labels=bc.map(c=>c.cat); offCh.data.datasets[0].data=bc.map(c=>c.amt);
   offCh.data.datasets[0].backgroundColor=bc.map(c=>c.color); safeUpdate(offCh);
 }else{
   offCh=new Chart(document.getElementById('offChart'),{type:'doughnut',data:{labels:bc.map(c=>c.cat),
     datasets:[{data:bc.map(c=>c.amt),backgroundColor:bc.map(c=>c.color),borderColor:'#fff',borderWidth:3,hoverOffset:10}]},
     options:{maintainAspectRatio:false,cutout:'60%',animation:{duration:1700,animateRotate:true,animateScale:true,easing:'easeOutQuart'},plugins:{legend:{position:'right',labels:{padding:8,font:{size:11}}},
       tooltip:{callbacks:{label:ctx=>ctx.label+' '+won(ctx.raw)+'원'}}}}});
 }
 document.getElementById('offList').innerHTML=by.filter(c=>c.amt>0).map(c=>
   `<div class="off-row"><span>${c.cat}</span><b>${won(c.amt)}<span class="mut"> 원</span></b></div>`).join('')
   +`<div class="off-row" style="border:0"><span style="font-weight:800">합계</span><b style="color:${cAmber}">${won(A.offTot)} 원</b></div>`;
 if(offM){
   offM.data.labels=A.monthlyOff.map(m=>m.month); offM.data.datasets[0].data=A.monthlyOff.map(m=>m.total); safeUpdate(offM);
 }else{
   offM=new Chart(document.getElementById('offMonth'),{type:'bar',data:{labels:A.monthlyOff.map(m=>m.month),
     datasets:[{label:'월별 헌금(원)',data:A.monthlyOff.map(m=>m.total),backgroundColor:'rgba(245,158,11,.5)',hoverBackgroundColor:cAmber,borderRadius:6,maxBarThickness:40}]},
     options:{maintainAspectRatio:false,animation:{duration:1500,easing:'easeOutQuart'},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>won(c.raw)+'원'}}},
       scales:{y:{beginAtZero:true,grid:{color:cLine},ticks:{callback:v=>v/10000+'만'}},x:{grid:{display:false}}}}});
 }
}

// ===== lists =====
function renderLists(){
 const w=D.order[cur],wd=D.weekly_detail[w];
 document.getElementById('absWk').textContent='· '+fmtDay(w);
 const chr=wd.absent.filter(a=>a.chronic).length;
 document.getElementById('absCnt').textContent='결석 '+wd.absent.length+'명 (장기 '+chr+')';
 const streakOf=n=>{let c=0;for(let i=cur;i>=0;i--){if(D.weekly_detail[D.order[i]].absent.some(a=>a.name===n))c++;else break;}return c;};
 document.getElementById('absBody').innerHTML=wd.absent.length?wd.absent.map(a=>
   `<tr><td style="font-weight:700">${a.name}</td><td>${a.grade}</td>
    <td>${a.chronic?'<span class="tag r">장기결석</span>':'<span class="tag a">결석</span>'}</td>
    <td><b style="font-weight:700">${streakOf(a.name)}</b><span class="mut"> 주 연속</span></td>
    <td><b style="font-weight:700">${A.freq[a.name]||0}</b><span class="mut"> 회</span></td></tr>`).join('')
   :'<tr><td colspan="5" class="mut" style="text-align:center;padding:18px">결석자 없음 🎉</td></tr>';
 // 개근자
 const nonNew=A.perfect.filter(p=>!p.joinIdx),news=A.perfect.filter(p=>p.joinIdx);
 document.getElementById('perfCnt').textContent='완전개근 '+nonNew.length+'명';
 document.getElementById('perfWrap').innerHTML=nonNew.map(p=>
   `<span class="chip">${p.name}<span class="gr">${p.grade}</span></span>`).join('')
   +(news.length?`<div style="margin-top:6px">${news.map(p=>`<span class="chip" style="border-color:var(--violet)">${p.name}<span class="gr">${p.grade}·신규</span></span>`).join('')}</div>`:'');
 document.getElementById('nearWrap').innerHTML=A.near.length?('<b class="mut">준개근(1회 결석):</b> '+A.near.map(n=>n.name+'('+n.grade+')').join(', ')):'';
 // 새친구
 document.getElementById('nfCnt').textContent='누적 '+A.nf.length+'명';
 document.getElementById('nfBody').innerHTML=A.nf.length?A.nf.map(n=>
   `<tr><td style="font-weight:700">${n.name}</td><td>${n.grade}</td><td class="mut">${n.date}</td><td class="mut">${n.note}</td></tr>`).join('')
   :'<tr><td colspan="4" class="mut" style="text-align:center;padding:14px">해당 시점까지 새친구 없음</td></tr>';
 document.getElementById('offTot').textContent=won(A.offTot)+'원';
}

// ===== master render =====
function render(){
 A=asof();
 const w=D.order[cur];
 document.getElementById('wkDate').textContent=fmtDate(w);
 document.getElementById('wkSub').textContent=fmtSub(w);
 document.getElementById('genlab').textContent='· 기준 '+fmtDate(w)+' 주일 (1월~'+w+' 누적) · 자료 '+D.generated;
 renderKPI();
 try{drawAtt(document.querySelector('#attToggle .on').dataset.m);}catch(err){console.warn('attChart',err);}
 try{drawGr(document.querySelector('#grToggle .on').dataset.m);}catch(err){console.warn('grChart',err);}
 try{drawOff();}catch(err){console.warn('offChart',err);}
function renderOfferList(){
 const cur_wk=D.order[cur], OL=(D.offerList&&D.offerList.rows)||[];
 const inRange=OL.filter(r=>r.idx>=0&&r.idx<=cur);
 const thisWk=inRange.filter(r=>r.idx===cur);
 const io=(D.offerList&&D.offerList.itemOrder)||[];
 const ord=r=>{const i=io.indexOf(r.item);return i<0?99:i;};
 thisWk.sort((a,b)=>ord(a)-ord(b));
 // 누적 참여 횟수
 const cnt={}; inRange.forEach(r=>r.names.forEach(n=>cnt[n]=(cnt[n]||0)+1));
 const rank=Object.entries(cnt).sort((a,b)=>a[0].localeCompare(b[0],'ko'));
 document.getElementById('olWk').textContent='· 1월~'+cur_wk+' 누적';
 document.getElementById('olCnt').textContent=inRange.length
   ? '참여 '+rank.length+'명 · '+inRange.length+'건' : '기록 없음';
 const box=document.getElementById('olBody');
 if(!inRange.length){
   box.innerHTML='<div class="ol-empty">해당 기간의 헌금명단 기록이 없습니다<br><span style="font-size:11.5px">(「헌금명단」 탭은 7월부터 기록 시작)</span></div>';
   return;
 }
 const chips=(names,hotMap)=>names.map(n=>{
   const c=hotMap?hotMap[n]:0, hot=c>=3;
   return `<span class="chip${hot?' hot':''}">${n}${c?`<span class="gr">${c}회</span>`:''}</span>`;}).join('');
 const rowHtml=r=>`<div class="ol-row"><div class="ol-h"><b>${r.item}</b>
     <span class="ol-amt">${won(r.amt)}<span class="mut"> 원${r.names.length?' · '+r.names.length+'명':''}</span></span></div>
   ${r.names.length?`<div style="margin-top:8px">${chips([...r.names].sort((a,b)=>a.localeCompare(b,'ko')))}</div>`:''}
   ${r.note?`<div class="ol-note">${r.note}</div>`:''}</div>`;
 const named=thisWk.filter(r=>r.names.length), plain=thisWk.filter(r=>!r.names.length);
 let html='<div class="ol-sub">선택주 내역 · '+fmtDay(cur_wk)+'</div>';
 html+= thisWk.length ? named.map(rowHtml).join('')
        +(plain.length?`<div class="ol-grid2">${plain.map(rowHtml).join('')}</div>`:'')
      : '<div class="ol-row"><div class="mut" style="font-size:12.5px">이 주의 헌금명단 기록이 없습니다</div></div>';
 html+='<div class="ol-sub" style="padding-top:12px;border-top:1px solid var(--line);margin-top:10px">누적 참여 횟수 · 1월~'+cur_wk+'</div>';
 html+=chips(rank.map(r=>r[0]),cnt);
 box.innerHTML=html;
}
 renderLists(); renderOfferList();
 document.getElementById('foot').innerHTML=
  '데이터 출처: <a href="https://docs.google.com/spreadsheets/d/1rXRzno9pE_PYXHR6KX5Hm4FGtrPVVoRUJouxkNmhD5k">주간 사역보고서</a>(출결·헌금) · '
  +'<a href="https://docs.google.com/spreadsheets/d/1-moFQc8npkYh3ARL4SIpIB-Yft60d9srv7YBrmWpXXo">온라인 출석부</a>(결석·명부·새친구) · 중고등부만 집계.<br>'
  +'주차 셀렉터 = <b>기준 시점(as-of)</b>: 선택한 주를 마감으로 1월부터 그 주까지 누적 집계합니다. '
  +'재적·교사는 선택주 시점, 결석자 명단은 선택주 당주. 출석률=학생 기준(새친구 포함) · 완전개근=해당 구간 결석 0회(신규 편입자 별도) · 헌금=이월금 제외 · 학년별·결석은 현 재적 43명 기준. '
  +'정적 스냅샷(주간 자동 갱신).';
}

// toggles
document.querySelectorAll('#attToggle button').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('#attToggle button').forEach(x=>x.classList.remove('on'));b.classList.add('on');drawAtt(b.dataset.m);});
document.querySelectorAll('#grToggle button').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('#grToggle button').forEach(x=>x.classList.remove('on'));b.classList.add('on');drawGr(b.dataset.m);});

// ===== 진입 / 스크롤 등장 애니메이션 =====
function setupMotion(){
 const hdr=document.querySelector('header'); if(hdr)hdr.classList.add('head-anim');
 const cards=Array.from(document.querySelectorAll('.wrap > .grid > .card'));
 const kpiBox=document.getElementById('kpis');
 const targets=cards.filter(c=>!kpiBox.contains(c));
 targets.forEach(c=>c.classList.add('rv'));
 const replayCharts=el=>{try{el.querySelectorAll('canvas').forEach(cv=>{
     const ch=(window.Chart&&Chart.getChart)?Chart.getChart(cv):null;
     if(ch&&(!ch.getActiveElements||ch.getActiveElements().length===0)){ch.reset();ch.update();}
   });}catch(e){}};
 const reveal=el=>{el.classList.add('in'); setTimeout(()=>replayCharts(el),120);
   setTimeout(()=>{el.classList.remove('rv','in');el.style.opacity='';},1300);};
 if(!('IntersectionObserver' in window)){targets.forEach(reveal);return;}
 const io=new IntersectionObserver((es)=>{
   es.forEach(e=>{ if(e.isIntersecting){ const el=e.target;
     const d=+(el.dataset.rd||0); setTimeout(()=>reveal(el),d); io.unobserve(el); } });
 },{threshold:0.12,rootMargin:'0px 0px -60px 0px'});
 targets.forEach((el,i)=>{el.dataset.rd=(i<2?i*180:0);io.observe(el);});
 // 빠른 스크롤로 관찰을 건너뛴 카드 보정: 화면 하단선을 지난 카드는 무조건 표시
 const sweep=()=>{targets.forEach(el=>{
   if(el.classList.contains('rv')&&!el.classList.contains('in')){
     const r=el.getBoundingClientRect();
     if(r.top < window.innerHeight*0.95){ io.unobserve(el); reveal(el); }
   }});};
 window.addEventListener('scroll',sweep,{passive:true});
 window.addEventListener('resize',sweep);
 setTimeout(sweep,60);
}
render();
setupMotion();
</script>
